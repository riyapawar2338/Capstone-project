<script>
'use strict';

/* ── Safe references to api.js internals via wrapper ───────── */
function retryConnection() {
  // Use the public API reset if available, else reload
  if (typeof DataService !== 'undefined' && typeof DataService.resetCache === 'function') {
    DataService.resetCache();
  }
  var badge = document.getElementById('connBadge');
  if (badge) badge.textContent = '🔄 Retrying…';
  var ob = document.getElementById('offlineBanner');
  if (ob) ob.classList.add('hidden');
  renderList();
}

/* ── Tag input references (safe init) ──────────────────────── */
var tTech = null, tSoft = null, tCert = null, tInt = null;
var pendingDel = null;

/* ── DOMContentLoaded ──────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async function () {

  // Guard: ensure required globals exist
  if (typeof Auth === 'undefined' || typeof DataService === 'undefined') {
    console.error('api.js not loaded correctly.');
    showToastSafe('Backend scripts failed to load. Please refresh.', 'error');
    return;
  }
  if (typeof initTagsInput === 'undefined') {
    console.error('script.js not loaded correctly.');
    return;
  }

  // Show/hide login banner
  var session = Auth.getSession();
  var loginBanner = document.getElementById('loginBanner');
  if (!session) {
    if (loginBanner) { loginBanner.classList.remove('hidden'); loginBanner.style.display = 'flex'; }
  } else {
    if (loginBanner) loginBanner.classList.add('hidden');
    if (session.role === 'admin') {
      var navAdmin = document.getElementById('navAdmin');
      if (navAdmin) navAdmin.classList.remove('hidden');
    }
  }

  // Init tags & file upload (with null guards)
  try {
    tTech = initTagsInput('wTech', 'sTech');
    tSoft = initTagsInput('wSoft', 'sSoft');
    tCert = initTagsInput('wCert', 'sCert');
    tInt  = initTagsInput('wInt',  'sInt');
  } catch (e) {
    console.error('Tags init failed:', e);
  }

  if (typeof initFileUpload === 'function') {
    initFileUpload('resumeArea');
  }

  // Show loading while checking backend
  var overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.classList.add('show');

  await renderList();

  if (overlay) overlay.classList.remove('show');

  // Show offline banner — use public flag if api.js exposes it
  var isOnline = (typeof DataService.isOnline === 'function')
    ? DataService.isOnline()
    : true; // assume online if unknown

  var ob = document.getElementById('offlineBanner');
  if (!isOnline && ob) {
    ob.classList.remove('hidden');
    ob.style.display = 'block';
  }

  // Delete confirmation button
  var delOk = document.getElementById('delOk');
  if (delOk) {
    delOk.addEventListener('click', async function () {
      if (!pendingDel) return;
      try {
        await DataService.deleteStudent(pendingDel);
        pendingDel = null;
        if (typeof closeModal === 'function') closeModal('delModal');
        showToastSafe('Student deleted.', 'info');
        await renderList();
      } catch (err) {
        showToastSafe('Delete failed: ' + err.message, 'error');
      }
    });
  }

  // Auto-fill if editing
  var editId = sessionStorage.getItem('editStudentId');
  if (editId) {
    sessionStorage.removeItem('editStudentId');
    await loadEdit(editId);
  }

  // Auto-fill from session for student role
  var sess2 = Auth.getSession();
  var sidVal = document.getElementById('sid');
  if (sess2 && sess2.role === 'student' && sidVal && !sidVal.value) {
    var emailEl = document.getElementById('sEmail');
    var nameEl  = document.getElementById('sName');
    var rollEl  = document.getElementById('sRoll');
    if (emailEl) emailEl.value = sess2.email  || '';
    if (nameEl  && sess2.name)   nameEl.value  = sess2.name;
    if (rollEl  && sess2.rollNo) rollEl.value  = sess2.rollNo;
  }
});

/* ── Safe toast wrapper (guard if showToast not yet loaded) ── */
function showToastSafe(msg, type) {
  if (typeof showToast === 'function') showToast(msg, type);
  else console.warn('Toast:', type, msg);
}

/* ── Validation error helpers ──────────────────────────────── */
function fe(id, msg) {
  var el = document.getElementById('e-' + id);
  if (!el) return;
  el.textContent = msg || '';
  var inp = document.getElementById(id);
  if (msg) {
    el.classList.add('show');
    if (inp) inp.classList.add('error');
  } else {
    el.classList.remove('show');
    if (inp) inp.classList.remove('error');
  }
}

function clearErr() {
  ['sName','sRoll','sDept','sSem','sCgpa','sEmail','sDom','sTech','sPhone']
    .forEach(function(id) { fe(id, ''); });
}

/* ── Save student ───────────────────────────────────────────── */
async function saveStudent() {
  // Guard: DataService must be ready
  if (typeof DataService === 'undefined') {
    showToastSafe('System not ready. Please refresh the page.', 'error');
    return;
  }

  // Guard: tag inputs must be initialised
  if (!tTech || !tSoft || !tCert || !tInt) {
    showToastSafe('Form not ready yet. Please wait a moment and try again.', 'error');
    return;
  }

  clearErr();

  var fn  = (document.getElementById('sName').value  || '').trim();
  var rn  = (document.getElementById('sRoll').value  || '').trim();
  var dp  = document.getElementById('sDept').value;
  var sm  = document.getElementById('sSem').value;
  var cg  = document.getElementById('sCgpa').value;
  var em  = (document.getElementById('sEmail').value || '').trim();
  var dm  = document.getElementById('sDom').value;
  var ph  = (document.getElementById('sPhone').value || '').trim();
  var pct = document.getElementById('sPct').value;

  var skills = tTech.getTags();
  var ok = true;

  if (!fn)     { fe('sName', 'Full name is required.');       ok = false; }
  if (!rn)     { fe('sRoll', 'Roll number is required.');     ok = false; }
  if (!dp)     { fe('sDept', 'Select a department.');         ok = false; }
  if (!sm)     { fe('sSem',  'Select a semester.');           ok = false; }
  if (!cg)     { fe('sCgpa', 'CGPA is required.');            ok = false; }
  else if (isNaN(parseFloat(cg)) || parseFloat(cg) < 0 || parseFloat(cg) > 10)
               { fe('sCgpa', 'CGPA must be 0–10.');           ok = false; }
  if (!em)     { fe('sEmail', 'Email is required.');          ok = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em))
               { fe('sEmail', 'Enter a valid email.');         ok = false; }
  if (!dm)     { fe('sDom',  'Select a preferred domain.');   ok = false; }
  if (!skills.length) { fe('sTech', 'Add at least one technical skill.'); ok = false; }
  if (ph && !/^[0-9]{10}$/.test(ph.replace(/\s/g, '')))
               { fe('sPhone', 'Enter valid 10-digit number.'); ok = false; }

  if (!ok) { showToastSafe('Please fix the highlighted errors.', 'error'); return; }

  var existId = (document.getElementById('sid').value || '').trim();

  // Build JSON payload
  var payload = {
    fullName:        fn,
    rollNo:          rn.toUpperCase(),
    department:      dp,
    semester:        sm,
    cgpa:            parseFloat(cg),
    percentage:      pct ? parseFloat(pct) : null,
    technicalSkills: tTech.getTags(),   // keep as arrays — let DataService serialise
    softSkills:      tSoft.getTags(),
    certifications:  tCert.getTags(),
    areasOfInterest: tInt.getTags(),
    projects:        (document.getElementById('sProj').value || '').trim(),
    preferredDomain: dm,
    email:           em,
    phone:           ph || null,
    city:            (document.getElementById('sCity').value || '').trim() || null,
  };

  // Use FormData only when a file is actually selected
  var resumeInput = document.getElementById('resumeFile');
  var hasFile = resumeInput && resumeInput.files && resumeInput.files.length > 0;

  if (hasFile) {
    var fd = new FormData();
    Object.entries(payload).forEach(function(pair) {
      var key = pair[0];
      var val = pair[1];
      if (Array.isArray(val)) {
        // Append each array item separately so the server sees key[]=a&key[]=b
        val.forEach(function(item) { fd.append(key + '[]', item); });
      } else {
        fd.append(key, val == null ? '' : val);
      }
    });
    fd.append('resume', resumeInput.files[0]);
    payload = fd;
  }

  // Disable save button while saving
  var saveBtn = document.getElementById('saveBtn');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ Saving…'; }

  try {
    if (existId) {
      await DataService.updateStudent(existId, payload);
      showToastSafe('✅ ' + fn + ' updated!', 'success');
    } else {
      await DataService.createStudent(payload);
      showToastSafe('✅ ' + fn + ' added!', 'success');
    }
    resetForm();
    await renderList();
  } catch (err) {
    showToastSafe('❌ Save failed: ' + err.message, 'error');
    console.error('saveStudent error:', err);
  } finally {
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.textContent = existId ? '💾 Update Profile' : '💾 Save Profile';
    }
  }
}

/* ── Load student into form for editing ────────────────────── */
async function loadEdit(id) {
  if (typeof DataService === 'undefined') return;
  try {
    var s = await DataService.getStudent(id);
    if (!s) { showToastSafe('Student not found.', 'error'); return; }

    var set = function(elId, val) {
      var el = document.getElementById(elId);
      if (el) el.value = val || '';
    };

    document.getElementById('sid').value = s._id || s.id;
    set('sName',  s.fullName);
    set('sRoll',  s.rollNo);
    set('sDept',  s.department);
    set('sSem',   s.semester);
    set('sCgpa',  s.cgpa);
    set('sPct',   s.percentage);
    set('sProj',  s.projects);
    set('sDom',   s.preferredDomain);
    set('sEmail', s.email);
    set('sPhone', s.phone);
    set('sCity',  s.city);

    var toArr = function(v) {
      if (Array.isArray(v)) return v;
      return (v || '').split(',').map(function(t) { return t.trim(); }).filter(Boolean);
    };

    if (tTech) tTech.setTags(toArr(s.technicalSkills));
    if (tSoft) tSoft.setTags(toArr(s.softSkills));
    if (tCert) tCert.setTags(toArr(s.certifications));
    if (tInt)  tInt.setTags(toArr(s.areasOfInterest));

    var rn = document.getElementById('resumeName');
    if (rn && s.resumeFile) rn.textContent = '📎 ' + s.resumeFile;

    var ft = document.getElementById('formTitle');
    var sb = document.getElementById('saveBtn');
    if (ft) ft.textContent = '✏️ Edit Profile';
    if (sb) sb.textContent = '💾 Update Profile';

    var fp = document.querySelector('.fp');
    if (fp) fp.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    showToastSafe('Could not load student: ' + err.message, 'error');
    console.error('loadEdit error:', err);
  }
}

/* ── Reset form ─────────────────────────────────────────────── */
function resetForm() {
  ['sName','sRoll','sCgpa','sPct','sProj','sEmail','sPhone','sCity']
    .forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
  ['sDept','sSem','sDom'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  var sidEl = document.getElementById('sid');
  if (sidEl) sidEl.value = '';

  var rn = document.getElementById('resumeName');
  if (rn) rn.textContent = '';
  var ra = document.getElementById('resumeArea');
  if (ra) ra.dataset.fileName = '';

  var rf = document.getElementById('resumeFile');
  if (rf) rf.value = ''; // clear file input

  if (tTech) tTech.setTags([]);
  if (tSoft) tSoft.setTags([]);
  if (tCert) tCert.setTags([]);
  if (tInt)  tInt.setTags([]);

  var ft = document.getElementById('formTitle');
  var sb = document.getElementById('saveBtn');
  if (ft) ft.textContent = '➕ Add New Student';
  if (sb) sb.textContent = '💾 Save Profile';

  clearErr();
}

/* ── Delete prompt ──────────────────────────────────────────── */
async function delPrompt(id) {
  if (typeof DataService === 'undefined') return;
  try {
    var s = await DataService.getStudent(id);
    if (!s) return;
    pendingDel = s._id || s.id;
    var dn = document.getElementById('delName');
    if (dn) dn.textContent = s.fullName;
    if (typeof openModal === 'function') openModal('delModal');
  } catch (e) {
    showToastSafe('Could not find student.', 'error');
  }
}

/* ── View toggle ─────────────────────────────────────────────── */
function goDash(id) {
  sessionStorage.setItem('viewStudentId', id);
  window.location.href = 'student-dashboard.html';
}
function inits(n) {
  return (n || '??').split(' ')
    .map(function(x) { return x[0] || ''; })
    .join('').toUpperCase().slice(0, 2) || '??';
}
function setView(v, btn) {
  document.querySelectorAll('.vb').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var gv = document.getElementById('gView');
  var tv = document.getElementById('tView');
  if (gv) gv.classList.toggle('hidden', v !== 'grid');
  if (tv) tv.classList.toggle('hidden', v !== 'table');
}

/* ── Render student list ─────────────────────────────────────── */
async function renderList() {
  if (typeof DataService === 'undefined') return;

  var q    = (document.getElementById('sQ')    ? document.getElementById('sQ').value    : '');
  var dept = (document.getElementById('fDept') ? document.getElementById('fDept').value : '');
  var sem  = (document.getElementById('fSem')  ? document.getElementById('fSem').value  : '');

  var params = {};
  if (q)    params.search     = q;
  if (dept) params.department = dept;
  if (sem)  params.semester   = sem;

  // Update connection badge
  var badge = document.getElementById('connBadge');

  var result;
  try {
    result = await DataService.getStudents(params);
    if (badge) badge.textContent = '🟢 Connected';
  } catch (e) {
    showToastSafe('Could not load students: ' + e.message, 'error');
    if (badge) badge.textContent = '🔴 Offline';
    result = { data: [], meta: { total: 0 } };
  }

  var list  = result.data  || [];
  var total = (result.meta && result.meta.total) || list.length;

  var tb = document.getElementById('totalBadge');
  var rc = document.getElementById('rCnt');
  if (tb) tb.textContent = total + ' Student' + (total !== 1 ? 's' : '');
  if (rc) rc.textContent = 'Showing ' + list.length + ' of ' + total + ' students';

  /* Grid view */
  var grid  = document.getElementById('sGrid');
  var empty = document.getElementById('emptyMsg');
  if (grid) grid.innerHTML = '';

  if (!list.length) {
    if (empty) empty.classList.remove('hidden');
  } else {
    if (empty) empty.classList.add('hidden');
    list.forEach(function(s) {
      var id     = s._id || s.id;
      var skills = Array.isArray(s.technicalSkills)
        ? s.technicalSkills
        : (s.technicalSkills || '').split(',').map(function(t) { return t.trim(); }).filter(Boolean);
      var shown  = skills.slice(0, 4);
      var extra  = skills.length - shown.length;
      var cgpa   = parseFloat(s.cgpa) || 0;
      var col    = cgpa >= 8 ? 'var(--success)' : cgpa >= 6 ? 'var(--warning)' : 'var(--danger)';

      var d = document.createElement('div');
      d.className = 'sc';
      d.innerHTML =
        '<div class="sc-hd"><div style="display:flex;gap:.75rem;align-items:center">'
        + '<div class="sc-av">' + inits(s.fullName) + '</div>'
        + '<div><div style="font-weight:700;font-size:.95rem">' + escHtml(s.fullName || '') + '</div>'
        + '<div style="font-family:var(--font-mono);font-size:.72rem;color:var(--muted)">' + escHtml(s.rollNo || '') + '</div></div></div>'
        + '<div style="display:flex;gap:.35rem">'
        + '<button class="btn btn-ghost btn-icon btn-sm" title="View Dashboard" onclick="goDash(\'' + id + '\')">👁️</button>'
        + '<button class="btn btn-ghost btn-icon btn-sm" title="Edit" onclick="loadEdit(\'' + id + '\')">✏️</button>'
        + '<button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="delPrompt(\'' + id + '\')">🗑️</button>'
        + '</div></div>'
        + '<div class="sc-mt">'
        + '<div><div class="l">Department</div><div class="v">' + escHtml(s.department || '—') + '</div></div>'
        + '<div><div class="l">Semester</div><div class="v">'   + escHtml(s.semester   || '—') + '</div></div>'
        + '<div><div class="l">CGPA</div><div class="v" style="color:' + col + '">' + cgpa + '</div></div>'
        + '<div><div class="l">Domain</div><div class="v">'     + escHtml(s.preferredDomain || '—') + '</div></div>'
        + '</div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:.35rem">'
        + shown.map(function(sk) { return '<span class="chip">' + escHtml(sk) + '</span>'; }).join('')
        + (extra > 0 ? '<span class="chip" style="background:rgba(255,255,255,.05);color:var(--muted)">+' + extra + '</span>' : '')
        + '</div>';
      if (grid) grid.appendChild(d);
    });
  }

  /* Table view */
  var tbody = document.getElementById('sTbl');
  if (!tbody) return;
  tbody.innerHTML = '';

  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:2rem">No students found.</td></tr>';
  } else {
    list.forEach(function(s, i) {
      var id   = s._id || s.id;
      var cgpa = parseFloat(s.cgpa) || 0;
      var col  = cgpa >= 8 ? 'var(--success)' : cgpa >= 6 ? 'var(--warning)' : 'var(--danger)';
      var tr   = document.createElement('tr');
      tr.innerHTML =
        '<td style="color:var(--muted);font-size:.78rem">' + (i + 1) + '</td>'
        + '<td><strong>' + escHtml(s.fullName || '') + '</strong></td>'
        + '<td><span style="font-family:var(--font-mono);font-size:.78rem">' + escHtml(s.rollNo || '') + '</span></td>'
        + '<td>' + escHtml(s.department || '—') + '</td>'
        + '<td>' + escHtml(s.semester   || '—') + '</td>'
        + '<td style="color:' + col + '"><strong>' + cgpa + '</strong></td>'
        + '<td>' + escHtml(s.preferredDomain || '—') + '</td>'
        + '<td><div style="display:flex;gap:.35rem">'
        + '<button class="btn btn-ghost btn-icon btn-sm" onclick="goDash(\'' + id + '\')" title="View">👁️</button>'
        + '<button class="btn btn-ghost btn-icon btn-sm" onclick="loadEdit(\'' + id + '\')" title="Edit">✏️</button>'
        + '<button class="btn btn-danger btn-icon btn-sm" onclick="delPrompt(\'' + id + '\')" title="Delete">🗑️</button>'
        + '</div></td>';
      tbody.appendChild(tr);
    });
  }
}

/* ── XSS protection helper ───────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
