<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — AI Internship System</title>
<link rel="stylesheet" href="style.css"/>
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--navy);
}
.auth-wrap  { width: 100%; max-width: 440px; padding: 1rem; }
.auth-card  {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 2.5rem;
  backdrop-filter: blur(20px);
}
.auth-logo  { text-align: center; margin-bottom: 2rem; }
.auth-logo .icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; margin: 0 auto .75rem;
  box-shadow: var(--shadow-glow);
}
.auth-logo h1 { font-size: 1.3rem; margin: 0 0 .3rem; }
.auth-logo p  { color: var(--muted); font-size: .85rem; margin: 0; }

.tab-bar {
  display: flex;
  background: rgba(255,255,255,.05);
  border-radius: 10px; padding: 4px; margin-bottom: 1.75rem;
}
.tab-btn {
  flex: 1; padding: .55rem; border: none; background: transparent;
  color: var(--muted); font-weight: 600; border-radius: 8px; cursor: pointer;
  transition: all .2s;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  color: var(--navy);
}

.auth-form          { display: none; }
.auth-form.active   { display: block; }

.error-msg {
  display: none;
  background: rgba(255,77,109,.12);
  border: 1px solid rgba(255,77,109,.3);
  padding: .65rem 1rem;
  border-radius: var(--radius);
  color: var(--danger);
  margin-bottom: 1rem;
  font-size: .875rem;
}
.error-msg.show { display: block; }

.success-msg {
  display: none;
  background: rgba(0,200,151,.12);
  border: 1px solid rgba(0,200,151,.3);
  padding: .65rem 1rem;
  border-radius: var(--radius);
  color: var(--success, #00c897);
  margin-bottom: 1rem;
  font-size: .875rem;
}
.success-msg.show { display: block; }

#connBadge {
  font-size: .72rem; padding: .45rem .8rem;
  border-radius: 10px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--glass-border);
  margin-bottom: 1rem;
  display: block; text-align: center;
}

.btn-loading { opacity: .7; pointer-events: none; }
</style>
</head>

<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="icon">🤖</div>
      <h1>AI Internship System</h1>
      <p>Login or Register to continue</p>
    </div>

    <span id="connBadge">🔄 Checking backend…</span>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('login', this)">Login</button>
      <button class="tab-btn"        onclick="switchTab('register', this)">Register</button>
    </div>

    <!-- ══════════════ LOGIN ══════════════ -->
    <div class="auth-form active" id="loginForm">
      <div class="error-msg" id="loginError"></div>

      <input id="lEmail" type="email"    placeholder="Email"    class="form-control"/>
      <input id="lPass"  type="password" placeholder="Password" class="form-control"/>

      <button class="btn btn-primary w-full" id="loginBtn" onclick="doLogin()">
        Login →
      </button>

      <p style="text-align:center;color:var(--muted);font-size:.8rem;margin-top:1rem">
        Admin credentials: <code>admin@aiias.edu</code> / <code>Admin@1234</code>
      </p>
    </div>

    <!-- ══════════════ REGISTER ══════════════ -->
    <div class="auth-form" id="registerForm">
      <div class="error-msg"    id="regError"></div>
      <div class="success-msg"  id="regSuccess"></div>

      <input id="rName"  type="text"     placeholder="Full Name"        class="form-control"/>
      <input id="rEmail" type="email"    placeholder="Email"            class="form-control"/>
      <input id="rRoll"  type="text"     placeholder="Roll No"          class="form-control"/>
      <input id="rPass"  type="password" placeholder="Password"         class="form-control"/>
      <input id="rPass2" type="password" placeholder="Confirm Password" class="form-control"/>

      <button class="btn btn-primary w-full" id="regBtn" onclick="doRegister()">
        Create Account →
      </button>
    </div>

  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<!-- Load api.js FIRST, then script.js -->
<script src="api.js"></script>
<script src="script.js"></script>

<script>
'use strict';

/* ── Redirect if already logged in ─────────────────────────── */
document.addEventListener('DOMContentLoaded', function () {
  try {
    if (window.Auth && Auth.isLoggedIn()) {
      redirectByRole();
    }
  } catch(e) {}

  refreshConnectionBadge();
});

/* ── Redirect helper ─────────────────────────────────────────── */
function redirectByRole() {
  var session = Auth.getSession();
  if (!session) return;
  window.location.href = (session.role === 'admin')
    ? 'admin-dashboard.html'
    : 'student-dashboard.html';
}

/* ── Connection badge ────────────────────────────────────────── */
async function refreshConnectionBadge() {
  var badge = document.getElementById('connBadge');
  try {
    var online = await window.isBackendOnline(true);
    badge.textContent = online ? '🟢 Backend Connected' : '🟡 Offline Mode (localStorage)';
    badge.style.color = online ? 'var(--success, #00c897)' : 'var(--warning, #f5a623)';
  } catch (e) {
    badge.textContent = '🟡 Offline Mode (localStorage)';
  }
}

/* ── Tab switch ──────────────────────────────────────────────── */
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b)  { b.classList.remove('active'); });
  document.querySelectorAll('.auth-form').forEach(function(f) { f.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById(tab + 'Form').classList.add('active');
  /* Clear errors when switching */
  hideError('loginError');
  hideError('regError');
  hideMsg('regSuccess');
}

/* ── Error / success helpers ─────────────────────────────────── */
function showError(id, msg) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
}
function hideError(id) {
  var el = document.getElementById(id);
  if (el) el.classList.remove('show');
}
function showMsg(id, msg) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
}
function hideMsg(id) {
  var el = document.getElementById(id);
  if (el) el.classList.remove('show');
}
function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  btn.classList.toggle('btn-loading', loading);
  btn.disabled = loading;
}

/* ══════════════════════════════════════════════════════════════
   LOGIN
══════════════════════════════════════════════════════════════ */
async function doLogin() {
  hideError('loginError');

  var email = document.getElementById('lEmail').value.trim();
  var pass  = document.getElementById('lPass').value;

  if (!email || !pass) {
    showError('loginError', 'Please enter your email and password.');
    return;
  }

  setLoading('loginBtn', true);

  try {
    /* ── Try online backend first ── */
    var online = await window.isBackendOnline(true);

    if (online) {
      try {
        var result = await AuthAPI.login(email, pass);
        /* result.user is normalised by api.js */
        Auth.setSession(result.user);
        redirectByRole();
        return;
      } catch (apiErr) {
        /* Backend returned an error — try offline fallback */
        console.warn('[login] Backend login failed, trying offline:', apiErr.message);
      }
    }

    /* ── Offline / localStorage fallback ── */
    var res = loginUser(email, pass);
    if (!res.ok) {
      showError('loginError', res.msg);
      return;
    }

    Auth.setSession(res.user);
    redirectByRole();

  } catch (e) {
    showError('loginError', 'Login failed: ' + (e.message || 'Unknown error'));
  } finally {
    setLoading('loginBtn', false);
  }
}

/* ══════════════════════════════════════════════════════════════
   REGISTER
══════════════════════════════════════════════════════════════ */
async function doRegister() {
  hideError('regError');
  hideMsg('regSuccess');

  var name  = document.getElementById('rName').value.trim();
  var email = document.getElementById('rEmail').value.trim();
  var roll  = document.getElementById('rRoll').value.trim();
  var pass  = document.getElementById('rPass').value;
  var pass2 = document.getElementById('rPass2').value;

  /* ── Client-side validation ── */
  if (!name || !email || !pass) {
    showError('regError', 'Full name, email and password are required.');
    return;
  }
  if (pass !== pass2) {
    showError('regError', 'Passwords do not match.');
    return;
  }
  if (pass.length < 6) {
    showError('regError', 'Password must be at least 6 characters.');
    return;
  }

  setLoading('regBtn', true);

  try {
    var online = await window.isBackendOnline(true);

    if (online) {
      try {
        /* FIX: Use StudentsAPI.register → hits /students/register (public route) */
        await StudentsAPI.register({
          fullName: name,
          email:    email,
          rollNo:   roll,
          password: pass
        });
        showMsg('regSuccess', '✅ Account created! Redirecting to login…');
        setTimeout(function() {
          switchTab('login', document.querySelectorAll('.tab-btn')[0]);
        }, 1500);
        return;
      } catch (apiErr) {
        /* Backend error — try offline */
        console.warn('[register] Backend register failed, trying offline:', apiErr.message);
        /* If email-already-exists from backend, show that error */
        if (apiErr.message && apiErr.message.toLowerCase().includes('email')) {
          showError('regError', apiErr.message);
          return;
        }
      }
    }

    /* ── Offline / localStorage fallback ── */
    /* FIX: Pass object — registerUser() now accepts both styles */
    var res = registerUser({ name: name, email: email, password: pass, rollNo: roll });
    if (!res.ok) {
      showError('regError', res.msg);
      return;
    }

    showMsg('regSuccess', '✅ Account created! You can now log in.');
    /* Clear fields */
    ['rName','rEmail','rRoll','rPass','rPass2'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    setTimeout(function() {
      switchTab('login', document.querySelectorAll('.tab-btn')[0]);
    }, 1500);

  } catch (e) {
    showError('regError', 'Registration failed: ' + (e.message || 'Unknown error'));
  } finally {
    setLoading('regBtn', false);
  }
}

/* ── Allow Enter key to submit ───────────────────────────────── */
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var activeForm = document.querySelector('.auth-form.active');
  if (!activeForm) return;
  if (activeForm.id === 'loginForm')    doLogin();
  if (activeForm.id === 'registerForm') doRegister();
});
</script>
</body>
</html>
