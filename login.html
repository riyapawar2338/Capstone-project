<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — AI Internship System</title>
<link rel="stylesheet" href="style.css"/>
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.auth-wrap { width: 100%; max-width: 460px; padding: 1.5rem; }
.auth-logo { text-align: center; margin-bottom: 1.8rem; }
.auth-logo .mark { width: 60px; height: 60px; font-size: 1.7rem; margin: 0 auto .8rem; }
.auth-logo h1 { font-size: 1.25rem; margin-bottom: .25rem; }
.tab-bar { display: flex; background: rgba(255,255,255,.05); border-radius: 10px; padding: 4px; margin-bottom: 1.7rem; }
.tab-btn { flex: 1; padding: .6rem; border: none; background: transparent; color: var(--muted); font-weight: 600; font-size: .88rem; border-radius: 8px; cursor: pointer; transition: all .2s; }
.tab-btn.active { background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #04101f; }
.auth-form { display: none; }
.auth-form.active { display: block; }
.alert { display: none; padding: .7rem 1rem; border-radius: var(--radius-sm); font-size: .85rem; margin-bottom: 1rem; }
.alert.show { display: block; }
.alert-error   { background: rgba(244,63,94,.12); border: 1px solid rgba(244,63,94,.3); color: #ff96a8; }
.alert-success { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); color: #7ee2a0; }
#connBadge { margin-bottom: 1.2rem; justify-content: center; width: 100%; }
.back-home { display: inline-flex; align-items: center; gap: .4rem; color: var(--muted); font-size: .85rem; margin-bottom: 1.4rem; }
</style>
</head>
<body>
<div class="auth-wrap">
  <a href="index.html" class="back-home">← Back to home</a>
  <div class="card glass" style="padding:2.3rem">

    <div class="auth-logo">
      <div class="mark" style="background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-glow)">🤖</div>
      <h1>AI Internship System</h1>
      <p class="text-muted" style="font-size:.85rem;margin:0">Login or register to continue</p>
    </div>

    <span id="connBadge" class="conn-badge">🔄 Checking backend…</span>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('login', this)">Login</button>
      <button class="tab-btn" onclick="switchTab('register', this)">Register</button>
    </div>

    <!-- ══════════════ LOGIN ══════════════ -->
    <div class="auth-form active" id="loginForm">
      <div class="alert alert-error" id="loginError"></div>

      <label class="form-label">Email</label>
      <input id="lEmail" type="email" placeholder="you@example.com" class="form-control" autocomplete="username"/>
      <label class="form-label">Password</label>
      <input id="lPass" type="password" placeholder="••••••••" class="form-control" autocomplete="current-password"/>

      <button class="btn btn-primary w-full" id="loginBtn" onclick="doLogin()">Login →</button>

      <p style="text-align:center;color:var(--muted);font-size:.8rem;margin-top:1.1rem">
        Admin demo: <code>admin@aiias.edu</code> / <code>Admin@1234</code>
      </p>
    </div>

    <!-- ══════════════ REGISTER ══════════════ -->
    <div class="auth-form" id="registerForm">
      <div class="alert alert-error"   id="regError"></div>
      <div class="alert alert-success" id="regSuccess"></div>

      <label class="form-label">Full Name</label>
      <input id="rName" type="text" placeholder="Riya Sharma" class="form-control"/>
      <label class="form-label">Email</label>
      <input id="rEmail" type="email" placeholder="you@example.com" class="form-control" autocomplete="username"/>
      <label class="form-label">Roll Number</label>
      <input id="rRoll" type="text" placeholder="e.g. CSE-2023-014" class="form-control"/>
      <label class="form-label">Password</label>
      <input id="rPass" type="password" placeholder="At least 6 characters" class="form-control" autocomplete="new-password"/>
      <label class="form-label">Confirm Password</label>
      <input id="rPass2" type="password" placeholder="Re-enter password" class="form-control" autocomplete="new-password"/>

      <button class="btn btn-primary w-full" id="regBtn" onclick="doRegister()">Create Account →</button>
      <p style="text-align:center;color:var(--muted);font-size:.8rem;margin-top:1.1rem">
        You can fill in skills, CGPA and the rest of your profile after registering.
      </p>
    </div>

  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="api.js"></script>
<script src="script.js"></script>
<script>
'use strict';

document.addEventListener('DOMContentLoaded', function () {
  if (Auth.isLoggedIn()) { redirectByRole(); return; }
  refreshConnectionBadge();
});

function redirectByRole() {
  var session = Auth.getSession();
  if (!session) return;
  var params = new URLSearchParams(window.location.search);
  var next = params.get('next');
  window.location.href = next || (session.role === 'admin' ? 'admin-dashboard.html' : 'student-dashboard.html');
}

async function refreshConnectionBadge() {
  var badge = document.getElementById('connBadge');
  try {
    var online = await isBackendOnline(true);
    badge.innerHTML = online ? '🟢 Backend connected' : '🟡 Offline mode — using this browser\'s storage';
    badge.style.color = online ? 'var(--success)' : 'var(--warning)';
  } catch (e) {
    badge.innerHTML = '🟡 Offline mode — using this browser\'s storage';
  }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
  document.querySelectorAll('.auth-form').forEach(function (f) { f.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById(tab + 'Form').classList.add('active');
  hideAlert('loginError'); hideAlert('regError'); hideAlert('regSuccess');
}

function showAlert(id, msg) { var el = document.getElementById(id); if (!el) return; el.textContent = msg; el.classList.add('show'); }
function hideAlert(id)      { var el = document.getElementById(id); if (el) el.classList.remove('show'); }
function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  btn.classList.toggle('btn-loading', loading);
  btn.disabled = loading;
  btn.textContent = loading ? 'Please wait…' : (btnId === 'loginBtn' ? 'Login →' : 'Create Account →');
}

async function doLogin() {
  hideAlert('loginError');
  var email = document.getElementById('lEmail').value.trim();
  var pass  = document.getElementById('lPass').value;

  if (!email || !pass) { showAlert('loginError', 'Please enter your email and password.'); return; }

  setLoading('loginBtn', true);
  try {
    await Auth.login(email, pass);
    showToast('Welcome back!', 'success');
    redirectByRole();
  } catch (e) {
    showAlert('loginError', e.message || 'Login failed. Please try again.');
  } finally {
    setLoading('loginBtn', false);
  }
}

async function doRegister() {
  hideAlert('regError'); hideAlert('regSuccess');
  var name  = document.getElementById('rName').value.trim();
  var email = document.getElementById('rEmail').value.trim();
  var roll  = document.getElementById('rRoll').value.trim();
  var pass  = document.getElementById('rPass').value;
  var pass2 = document.getElementById('rPass2').value;

  if (!name || !email || !pass) { showAlert('regError', 'Full name, email and password are required.'); return; }
  if (pass !== pass2)           { showAlert('regError', 'Passwords do not match.'); return; }
  if (pass.length < 6)          { showAlert('regError', 'Password must be at least 6 characters.'); return; }

  setLoading('regBtn', true);
  try {
    await Auth.register({ fullName: name, email: email, rollNo: roll, password: pass });
    showAlert('regSuccess', '✅ Account created! You can log in now.');
    ['rName','rEmail','rRoll','rPass','rPass2'].forEach(function (id) { document.getElementById(id).value = ''; });
    setTimeout(function () { switchTab('login', document.querySelectorAll('.tab-btn')[0]); }, 1300);
  } catch (e) {
    showAlert('regError', e.message || 'Registration failed. Please try again.');
  } finally {
    setLoading('regBtn', false);
  }
}

document.addEventListener('keydown', function (e) {
  if (e.key !== 'Enter') return;
  var activeForm = document.querySelector('.auth-form.active');
  if (!activeForm) return;
  if (activeForm.id === 'loginForm') doLogin();
  if (activeForm.id === 'registerForm') doRegister();
});
</script>
</body>
</html>
